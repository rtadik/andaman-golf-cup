<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andaman Golf Cup — Content Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1a2e;
      --bg2:        #16213e;
      --bg3:        #0f3460;
      --surface:    #1e2a45;
      --surface2:   #253454;
      --gold:       #C9A84C;
      --gold-light: #e0c06a;
      --text:       #e8eaf0;
      --text-muted: #8892a4;
      --border:     #2e3d5c;
      --green:      #2ecc71;
      --radius:     8px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── STICKY HEADER ─────────────────────────────────────────── */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg2);
      border-bottom: 2px solid var(--gold);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      min-height: 60px;
      flex-wrap: wrap;
    }

    #header h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    #header .divider {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    /* Language tabs */
    #lang-tabs {
      display: flex;
      gap: 4px;
    }

    .lang-tab {
      padding: 6px 18px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .lang-tab:hover { border-color: var(--gold); color: var(--gold); }

    .lang-tab.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #1a1a2e;
    }

    /* Export button */
    #export-btn {
      margin-left: auto;
      padding: 8px 22px;
      background: var(--gold);
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #export-btn:hover { background: var(--gold-light); }

    #export-btn:active { transform: scale(0.98); }

    /* ── MAIN LAYOUT ───────────────────────────────────────────── */
    #main {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .page-note {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .page-note strong { color: var(--gold); }

    /* ── ACCORDION SECTIONS ────────────────────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      background: var(--surface);
      transition: background 0.12s;
    }

    .section-header:hover { background: var(--surface2); }

    .section-header.open { background: var(--surface2); }

    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
      text-transform: uppercase;
    }

    .section-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .chevron {
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .section-header.open .chevron { transform: rotate(180deg); }

    .section-body {
      display: none;
      padding: 6px 18px 18px;
      border-top: 1px solid var(--border);
    }

    .section-body.open { display: block; }

    /* ── FIELD ─────────────────────────────────────────────────── */
    .field {
      margin-top: 14px;
    }

    .field-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .field-key {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 6px;
    }

    .field input[type="text"],
    .field textarea {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.88rem;
      padding: 9px 12px;
      font-family: inherit;
      transition: border-color 0.15s;
      resize: vertical;
    }

    .field input[type="text"]:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--gold);
    }

    .field textarea { min-height: 90px; line-height: 1.5; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── TOAST ─────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--green);
      color: #fff;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 9999;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────── -->
<div id="header">

/* ================================================================
   BUILD UI
================================================================ */
function buildSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  SCHEMA.forEach(section => {
    const el = document.createElement('div');
    el.className = 'section';
    el.dataset.section = section.id;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <svg class="chevron" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>
      <span class="section-title">${section.title}</span>
      <span class="section-count">${section.fields.length} fields</span>
    `;

    const body = document.createElement('div');
    body.className = 'section-body';
    body.dataset.sectionBody = section.id;

    section.fields.forEach(field => {
      body.appendChild(buildField(field));
    });

    header.addEventListener('click', () => {
      const isOpen = header.classList.contains('open');
      header.classList.toggle('open', !isOpen);
      body.classList.toggle('open', !isOpen);
    });

    el.appendChild(header);
    el.appendChild(body);
    container.appendChild(el);
  });
}

function buildField(field) {
  const wrap = document.createElement('div');
  wrap.className = 'field';

  const label = document.createElement('label');
  label.className = 'field-label';
  label.textContent = field.label;

  const keySpan = document.createElement('span');
  keySpan.className = 'field-key';
  keySpan.textContent = field.key;

  const currentVal = data[activeLang][field.key] || '';

  let input;
  if (field.multiline) {
    input = document.createElement('textarea');
    input.rows = 3;
  } else {
    input = document.createElement('input');
    input.type = 'text';
  }
  input.value = currentVal;
  input.dataset.key = field.key;
  input.addEventListener('input', e => {
    data[activeLang][field.key] = e.target.value;
  });

  wrap.appendChild(label);
  wrap.appendChild(keySpan);
  wrap.appendChild(input);
  return wrap;
}

function populateFields() {
  // Update all existing inputs with values for active lang
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.dataset.key;
    el.value = data[activeLang][key] || '';
  });
}

/* ================================================================
   LANGUAGE SWITCHING
================================================================ */
document.getElementById('lang-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.lang-tab');
  if (!btn) return;
  activeLang = btn.dataset.lang;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t === btn));
  populateFields();
});

/* ================================================================
   EXPORT
================================================================ */
function escape(str) {
  // Escape backslashes, then single quotes, preserve actual newlines as \n literal
  return str
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r?\n/g, '\\n');
}

function pad(key, val, indent) {
  // Align values nicely — key padded to ~40 chars
  const k = `'${key}':`;
  return `${indent}${k.padEnd(42)} '${escape(val)}',`;
}

function buildSection(langData, keys, comment, indent) {
  const lines = [`\n${indent}// ── ${comment} ──────────────────────────────────────────────────────`];
  keys.forEach(key => {
    const val = langData[key] !== undefined ? langData[key] : '';
    lines.push(pad(key, val, indent));
  });
  return lines.join('\n');
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/javascript;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('export-btn').addEventListener('click', () => {
  const js = generateContentJS();
  downloadFile('content.js', js);
  showToast('content.js downloaded');
});
